[build]
  base = "/"
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  PNPM_VERSION = "9"

[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_modules = "node_modules"
  included_files = ["configs/**", "lib/server/**", ".next/server/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"
